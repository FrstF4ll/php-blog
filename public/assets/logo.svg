<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
    <defs>
        <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#818cf8" />
            <stop offset="100%" stop-color="#6366f1" />
        </linearGradient>
        <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000000" flood-opacity="0.5"/>
        </filter>
        <filter id="neonGlow" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
            <feMerge>
                <feMergeNode in="coloredBlur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
    </defs>

    <g transform="translate(50, 50) scale(1.1) translate(-50, -50)">
        <!-- Center Glowing Diamond Behind Everything -->
        <path d="M 50,32 L 68,50 L 50,68 L 32,50 Z" fill="url(#glow)" filter="url(#neonGlow)"/>
        <path d="M 50,35 L 65,50 L 50,65 L 35,50 Z" fill="#4f46e5" /> <!-- Inner Cutout colored solid indigo -->

        <g fill="#ffffff" filter="url(#shadow)">
            <!-- Left Bracket -->
            <path d="M 22,20 L 15,20 C 10,20 10,40 5,50 C 10,60 10,80 15,80 L 22,80 L 22,70 L 17,70 C 15,70 15,58 12,50 C 15,42 15,30 17,30 L 22,30 Z"/>

            <!-- Right Bracket -->
            <path d="M 78,20 L 85,20 C 90,20 90,40 95,50 C 90,60 90,80 85,80 L 78,80 L 78,70 L 83,70 C 85,70 85,58 88,50 C 85,42 85,30 83,30 L 78,30 Z"/>

            <!-- Top Pillar -->
            <path d="M 44,10 L 56,10 L 56,26 L 50,32 L 44,26 Z"/>

            <!-- Bottom Pillar -->
            <path d="M 44,90 L 56,90 L 56,74 L 50,68 L 44,74 Z"/>

            <!-- Left Chevron -->
            <path d="M 24,50 L 46,28 L 46,38 L 34,50 L 46,62 L 46,72 Z"/>

            <!-- Right Chevron -->
            <path d="M 76,50 L 54,28 L 54,38 L 66,50 L 54,62 L 54,72 Z"/>
        </g>
    </g>
</svg>
